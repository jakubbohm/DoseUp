schema: spec-driven

context: |
  DoseUp — medication & supplement dose tracker for an invite-only circle (family/
  friends), hosted by the maintainer on Azure. Mobile-first installable React PWA.
  The repo is also a showcase of spec-driven, AI-assisted development.

  Read before drafting any artifact:
  - docs/product/vision.md (goals & non-goals)  ·  docs/product/requirements.md
    (FR-x/NFR-x — cite ids)  ·  docs/product/roadmap.md (current milestone)
  - docs/adr/0001..0004 (platform, architecture, testing, delivery/process)
  - docs/conventions/ (source of truth for conventions)

  Stack: .NET 11 previews for services (AppHost stays net10) · Aspire 13.4 ·
  FastEndpoints · React + Vite + TypeScript PWA · Neon serverless Postgres
  (Aspire Postgres container locally) · EF Core 11 previews + Npgsql ·
  Wolverine + Azure Service Bus Basic (async seam) · Storage Queue visibility
  alarms (reminders) · Entra External ID · Azure Container Apps ·
  GitHub Actions · TUnit + Shouldly · ArchUnitNET · @playwright/test.

  Architecture (ADR-0002): modular monolith in the single API project — modules =
  bounded contexts, each with Domain (clean core: aggregates, ports, invariants
  returning Result, domain events), Features (vertical slices: endpoint + validator
  + handler per use case), Infrastructure (adapters), and a declared rigor grade;
  plus SharedKernel (union Result, Error model, typed IDs) and Platform (composition
  root, auth, ProblemDetails mapping, Wolverine outbox). Cross-module communication
  ONLY via public contracts + integration events (async, post-commit, Wolverine
  transactional outbox in the same EF Core transaction; consumers idempotent);
  domain events are sync, in-module, in-UoW (DbContext = the unit of work). No
  mediator: the FastEndpoints endpoint IS the handler; request/response DTOs double
  as API contract and handler payload and stop at the domain boundary. Expected
  failures flow as Result end-to-end and map
  to ProblemDetails at the edge; validation is two-layer (FluentValidation for
  request shape, domain invariants as Result). Boundaries are enforced by
  ArchUnitNET tests, not project references.

  Domain language: an account (Entra identity) owns profiles; every substance,
  schedule, and dose log entry belongs to exactly one profile. Schedule times are
  profile-local and DST-safe. Never log dose contents (ids only — NFR-5).

  Change naming (PRE-12): every new change takes a 3-digit sequential prefix +
  kebab-case name — NNN-verb-topic (e.g. 001-add-walking-skeleton). NNN is the
  next number across openspec/changes/ and the archive; numbering never resets.

rules:
  proposal:
    - Confirm the change id carries the next 3-digit sequential prefix (NNN-kebab-name; check openspec/changes/ and the archive for the highest NNN)
    - Cite the FR/NFR ids from docs/product/requirements.md and the roadmap milestone this change serves
    - Include a Non-goals section
  specs:
    - Use the domain terms account / profile / substance / schedule / dose consistently; all data is profile-scoped
  design:
    - Record cross-cutting decisions as an ADR in docs/adr/ and reference it
    - UI-heavy changes reference a Claude Design mockup + handoff bundle
    - Changes touching the API contract plan the TS client regeneration explicitly
  tasks:
    - Slice tasks to complete in one sitting (~2h max), each ending with build and tests green
    - Changes touching the API contract include an explicit "regenerate TS client" task (CI only gates drift)
    - A task introducing a feature flag also schedules the flag's removal
