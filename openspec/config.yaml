schema: spec-driven

context: |
  DoseUp — medication & supplement dose tracker for an invite-only circle (family/
  friends), hosted by the maintainer on Azure. Mobile-first installable React PWA.
  The repo is also a showcase of spec-driven, AI-assisted development.

  Read before drafting any artifact:
  - docs/product/vision.md (goals & non-goals)  ·  docs/product/requirements.md
    (FR-x/NFR-x — cite ids)  ·  docs/product/roadmap.md (current milestone)
  - docs/adr/0001..0004 (platform, architecture, testing, delivery/process)
  - docs/conventions/ (source of truth for conventions)

  Stack: .NET 11 previews for services (AppHost stays net10) · Aspire 13.4 ·
  FastEndpoints · React + Vite + TypeScript PWA · openapi-typescript +
  openapi-fetch (generated TS contract client) · Neon serverless Postgres
  (Aspire Postgres container locally) · EF Core 11 previews + Npgsql ·
  Ardalis.SmartEnum (domain closed value sets) ·
  Wolverine + Azure Service Bus Basic (async seam) · Storage Queue visibility
  alarms (reminders) · Entra External ID · Azure Container Apps ·
  Bicep + Azure Deployment Stacks (hand-authored IaC, PRE-9) ·
  GitHub Actions · TUnit + Shouldly · ArchUnitNET · @playwright/test.

  Architecture (ADR-0002): modular monolith in the single API project — modules =
  bounded contexts, each with Domain (clean core: aggregates, ports, rules
  returning Result, domain events), Features (vertical slices: thin endpoint +
  feature handler + validator per use case), Infrastructure (adapters), and a
  declared rigor grade; plus SharedKernel (union Result, Error model,
  RuleCheck/RuleSet, typed ids, domain-event + publisher ports) and Platform
  (composition root, auth, the single ProblemDetails mapper, Wolverine outbox).
  Cross-module communication ONLY via public contracts + integration events
  (async, post-commit, Wolverine transactional outbox in the same EF Core
  transaction; consumers idempotent); domain events are sync, in-module, in-UoW
  (DbContext = the unit of work). No mediator (PRE-7): thin FastEndpoints
  endpoints (route/spec/auth/ProblemDetails mapping) directly inject
  framework-free feature handlers — they own the DTOs, run FluentValidation as
  their first step, and orchestrate the domain; Wolverine consumers call the
  same handlers. DTOs double as API contract and handler payload and stop at
  the domain boundary. Integration events are translated domain facts:
  aggregates raise events, one per-module translator publishes thin id-only
  Contracts.* payloads — never from handlers. Entity identity: client-generated
  Guid v7 wrapped in per-aggregate typed ids; no repository layer (DbContext is
  the data-access API). Expected failures flow as Result end-to-end and map to
  ProblemDetails at the edge; validation is two-layer (FluentValidation for
  request shape as handler step 1; domain rules via RuleCheck/RuleSet →
  RuleViolations → 409 with aggregated violations —
  docs/conventions/domain-rules.md). Boundaries are enforced by ArchUnitNET
  tests, not project references.

  Authorization (PRE-10) is three-ring and engine-free: endpoints are secure by
  default (AllowAnonymous = explicit arch-tested allowlist); an ActiveAccount
  policy resolves the Entra oid claim to the account row and yields the
  request-scoped CallerContext — the only identity type past Platform (account
  status + admin flag are DB columns, so revocation bites on the next request);
  admin endpoints sit in one AdminOnly group; all profile-scoped data access is
  account-scoped by construction — cross-account access surfaces as NotFound
  (404, anti-enumeration, never 403), Forbidden/403 is reserved for
  request-class denials; admin has no data access; the unauthenticated path
  (incl. health probes) never touches the database.

  Domain language: an account (Entra identity) owns profiles; every substance,
  schedule, and dose log entry belongs to exactly one profile. Schedule times are
  profile-local and DST-safe. Never log dose contents (ids only — NFR-5).

  Change naming (PRE-12, amended 2026-07-15): every new change takes a
  letter-prefixed 3-digit sequential id — cNNN-verb-topic (e.g.
  c001-add-shared-kernel); the leading `c` satisfies the OpenSpec CLI's
  letter-first name rule. NNN is the next number across openspec/changes/ and
  the archive; numbering never resets.

rules:
  proposal:
    - Confirm the change id carries the next letter-prefixed 3-digit sequence (cNNN-kebab-name; check openspec/changes/ and the archive for the highest NNN)
    - Create the change's branch off the freshest main before drafting any artifact — `git fetch origin` then `git switch -c <type>/<change-id> origin/main`, where <type> is the Conventional-Commit type the eventual PR title will carry (ADR-0004, trunk-based short-lived branches); never draft a change on main
    - Cite the FR/NFR ids from docs/product/requirements.md and the roadmap milestone this change serves
    - Include a Non-goals section
  specs:
    - Use the domain terms account / profile / substance / schedule / dose consistently; all data is profile-scoped
    - Cross-account access to profile-scoped resources specs as NotFound/404 (never 403, incl. foreign profile ids in payloads); Forbidden/403 only for request-class denials — inactive account, non-admin on admin endpoints (PRE-10)
    - Domain-rule denials spec as 409 with stable violation codes (`<aggregate>.<rule>`); contract-shape errors as 400 — per the docs/conventions/domain-rules.md taxonomy (PRE-7)
  design:
    - Record cross-cutting decisions as an ADR in docs/adr/ and reference it
    - UI-heavy changes reference a Claude Design mockup + handoff bundle
    - Changes touching the API contract plan the TS client regeneration explicitly
    - Changes touching the AppHost resource graph or Azure topology plan the infra Bicep update explicitly (hand-authored IaC — PRE-9)
  tasks:
    - Slice tasks to complete in one sitting (~2h max), each ending with build and tests green
    - 'Changes touching the API contract include an explicit "regenerate TS client" task — one script: FastEndpoints --exportswaggerjson → openapi.json → openapi-typescript types, both committed (CI only gates drift, never generates or commits fixes; PRE-6). A change modifying an existing contract (not a pure addition) also includes tasks to update every TS consumer — facade layer per PRE-5 if adopted, and all usages — in the same change'
    - Changes touching the AppHost resource graph or Azure topology include an explicit "update infra Bicep + .bicepparam" task — infra is hand-authored IaC deployed as a deployment stack; the AppHost models local orchestration only (PRE-9)
    - A task adding an endpoint also classifies it in the authorization matrix (kind + arrange recipe) and updates the anonymous allowlist when applicable — the arch/matrix completeness gates fail otherwise (PRE-8, docs/conventions/testing.md)
    - A task introducing a feature flag also schedules the flag's removal
